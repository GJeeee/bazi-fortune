<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#F9F7F2">
  <title>今日宜忌</title>
  <link rel="stylesheet" href="css/style.css?v=32">
</head>
<body>
  <div class="app">
    <main id="home-section" class="home-screen">
      <header class="home-daily">
        <p class="home-kicker">今日宜忌</p>
        <p class="home-day-num" id="home-day-num" aria-hidden="true"></p>
        <p class="home-meta" id="home-meta"></p>
        <p class="home-ganzhi-serial" id="home-ganzhi"></p>
        <p class="home-jieqi" id="jieqi-note"></p>
        <p class="home-yiji" id="huangli-block"></p>
        <p class="daily-hint" id="daily-hint"></p>
      </header>

      <section class="home-input">
        <form id="birth-form" class="home-form" autocomplete="off" novalidate>
          <div class="birth-fields">
            <label class="field-item">
              <input type="number" id="birth-year" class="inp-line" min="1920" max="2030" placeholder="1990" aria-label="出生年">
              <span class="field-unit">年</span>
            </label>
            <label class="field-item">
              <input type="number" id="birth-month" class="inp-line inp-short" min="1" max="12" placeholder="6" aria-label="月">
              <span class="field-unit">月</span>
            </label>
            <label class="field-item">
              <input type="number" id="birth-day" class="inp-line inp-short" min="1" max="31" placeholder="15" aria-label="日">
              <span class="field-unit">日</span>
            </label>
            <label class="field-item field-shi">
              <select id="birth-hour" class="inp-line inp-select" aria-label="出生时辰"></select>
            </label>
            <div class="gender-seg" role="radiogroup" aria-label="性别">
              <label class="seg-opt"><input type="radio" name="gender" value="male" checked>男</label>
              <label class="seg-opt"><input type="radio" name="gender" value="female">女</label>
            </div>
          </div>
          <p class="form-error hidden" id="form-error" role="alert"></p>
          <div class="muyu-zone">
            <button type="button" class="btn-muyu" id="submit-btn" aria-label="敲击木鱼排盘">
              <span class="muyu-wrap">
                <svg class="muyu-icon" viewBox="0 0 48 48" aria-hidden="true">
                  <ellipse cx="24" cy="26" rx="16" ry="11" fill="none" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M12 26 Q24 18 36 26" fill="none" stroke="currentColor" stroke-width="1"/>
                  <line x1="24" y1="15" x2="24" y2="37" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
                  <circle cx="24" cy="12" r="2" fill="currentColor" opacity="0.35"/>
                </svg>
              </span>
              <span class="muyu-label">敲击以此排盘</span>
            </button>
          </div>
        </form>
      </section>

      <footer class="home-footer">
        <button type="button" class="btn-foot-link hidden" id="quick-btn">查看已保存</button>
        <p class="home-foot-note">AI说说而已，制作人免责。</p>
      </footer>
    </main>

    <section class="result-page hidden" id="result-section">
      <header class="result-header">
        <button type="button" class="result-nav-btn" id="edit-btn" aria-label="返回">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h1 class="result-header-title">我的能量报告</h1>
        <button type="button" class="result-nav-btn" id="share-btn" aria-label="分享">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 3v12M8 7l4-4 4 4M5 14v5a2 2 0 002 2h10a2 2 0 002-2v-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>

      <p class="ai-status" id="ai-status">正在生成个性化解读…</p>

      <div class="result-scroll">
        <section class="result-hero">
          <p class="result-daymaster" id="day-master-hero"></p>
          <p class="result-keywords" id="personality-keywords"></p>
        </section>

        <section class="result-paipan">
          <div class="paipan-compact" id="paipan-grid"></div>
          <div class="wuxing-bars" id="wuxing-bars"></div>
        </section>

        <section class="result-tabs-wrap">
          <div class="result-tabs" role="tablist" aria-label="运势周期">
            <button type="button" class="result-tab is-active" data-tab="liuri" role="tab" aria-selected="true">今日</button>
            <button type="button" class="result-tab" data-tab="liuyue" role="tab" aria-selected="false">本月</button>
            <button type="button" class="result-tab" data-tab="liunian" role="tab" aria-selected="false">今年</button>
            <button type="button" class="result-tab" data-tab="dayun" role="tab" aria-selected="false">大运</button>
          </div>
          <div class="result-tab-panel" id="luck-tab-panel" role="tabpanel"></div>
        </section>

        <section class="result-stick-wrap">
          <button type="button" class="stick-cta-btn" id="fortune-stick-btn" aria-label="摇签求签">
            <span class="stick-cta-icon">🎋</span>
            <span class="stick-cta-text">摇一摇，求今日灵签</span>
          </button>
          <div class="fortune-stick-card hidden" id="fortune-stick-card">
            <p class="fortune-stick-no" id="fortune-stick-no"></p>
            <div class="fortune-stick-msg" id="fortune-stick-msg"></div>
          </div>
        </section>

        <p class="result-disclaimer">AI说说而已，制作人免责。</p>
      </div>

      <div class="result-bottom-bar">
        <button type="button" class="btn-ghost-home" id="edit-btn-bottom">返回首页</button>
      </div>
    </section>
  </div>

  <script src="js/ai-config.js?v=22"></script>
  <script src="js/bazi.js?v=22"></script>
  <script src="js/huangli.js?v=22"></script>
  <script src="js/paipan.js?v=22"></script>
  <script src="js/fortune.js?v=28"></script>
  <script src="js/ai-fortune.js?v=28"></script>
  <script src="js/daily-hint.js?v=2"></script>
  <script src="js/fortune-stick.js?v=26"></script>
  <script src="js/muyu.js?v=23"></script>
  <script src="js/app.js?v=32"></script>
</body>
</html>
