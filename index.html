<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#F9F7F2">
  <title>今日宜忌</title>
  <link rel="stylesheet" href="css/style.css?v=46">
</head>
<body>
  <div class="app">
    <main id="home-section" class="home-screen">
      <header class="home-daily">
        <p class="home-kicker">今日宜忌</p>
        <p class="home-day-num" id="home-day-num" aria-hidden="true"></p>
        <p class="home-meta" id="home-meta"></p>
        <p class="home-ganzhi-serial" id="home-ganzhi"></p>
        <p class="home-jieqi" id="jieqi-note"></p>
        <p class="home-yiji" id="huangli-block"></p>
        <p class="daily-hint" id="daily-hint"></p>
      </header>

      <section class="home-input">
        <form id="birth-form" class="home-form" autocomplete="off" novalidate>
          <div class="birth-fields">
            <label class="field-item">
              <input type="number" id="birth-year" class="inp-line" min="1920" max="2030" placeholder="1990" aria-label="出生年">
              <span class="field-unit">年</span>
            </label>
            <label class="field-item">
              <input type="number" id="birth-month" class="inp-line inp-short" min="1" max="12" placeholder="6" aria-label="月">
              <span class="field-unit">月</span>
            </label>
            <label class="field-item">
              <input type="number" id="birth-day" class="inp-line inp-short" min="1" max="31" placeholder="15" aria-label="日">
              <span class="field-unit">日</span>
            </label>
            <label class="field-item field-shi">
              <select id="birth-hour" class="inp-line inp-select" aria-label="出生时辰"></select>
            </label>
            <div class="gender-seg" role="radiogroup" aria-label="性别">
              <label class="seg-opt"><input type="radio" name="gender" value="male" checked>男</label>
              <label class="seg-opt"><input type="radio" name="gender" value="female">女</label>
            </div>
          </div>
          <p class="form-error hidden" id="form-error" role="alert"></p>
          <div class="muyu-zone">
            <button type="button" class="btn-muyu" id="submit-btn" aria-label="敲击木鱼排盘">
              <span class="muyu-wrap">
                <svg class="muyu-icon" viewBox="0 0 48 48" aria-hidden="true">
                  <ellipse cx="24" cy="26" rx="16" ry="11" fill="none" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M12 26 Q24 18 36 26" fill="none" stroke="currentColor" stroke-width="1"/>
                  <line x1="24" y1="15" x2="24" y2="37" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
                  <circle cx="24" cy="12" r="2" fill="currentColor" opacity="0.35"/>
                </svg>
              </span>
              <span class="muyu-label">敲击以此排盘</span>
            </button>
          </div>
        </form>
      </section>

      <footer class="home-footer">
        <button type="button" class="btn-foot-link hidden" id="quick-btn">查看已保存</button>
        <p class="home-foot-note">AI说说而已，制作人免责。</p>
      </footer>
    </main>

    <!-- 能量报告页 -->
    <section class="result-page hidden" id="result-section">
      <header class="result-header">
        <button type="button" class="result-nav-btn" id="edit-btn" aria-label="返回">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h1 class="result-header-title">我的能量报告</h1>
        <button type="button" class="result-nav-btn" id="share-btn" aria-label="分享">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 3v12M8 7l4-4 4 4M5 14v5a2 2 0 002 2h10a2 2 0 002-2v-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>

      <p class="ai-status" id="ai-status">正在生成个性化解读…</p>

      <div class="result-scroll">
        <section class="result-hero">
          <p class="result-daymaster" id="day-master-hero"></p>
          <blockquote class="result-empathy" id="personality-empathy"></blockquote>
          <p class="result-keywords" id="personality-keywords"></p>
        </section>

        <section class="result-luck-wrap">
          <div class="luck-segment" role="tablist" aria-label="运势周期">
            <button type="button" class="result-tab is-active" data-tab="liuri" role="tab" aria-selected="true">今日</button>
            <button type="button" class="result-tab" data-tab="liuyue" role="tab" aria-selected="false">本月</button>
            <button type="button" class="result-tab" data-tab="liunian" role="tab" aria-selected="false">今年</button>
            <button type="button" class="result-tab" data-tab="dayun" role="tab" aria-selected="false">大运</button>
          </div>
          <div class="result-tab-panel" id="luck-tab-panel" role="tabpanel"></div>
        </section>

        <section class="result-paipan">
          <div class="wuxing-chart-wrap">
            <h2 class="result-section-label">五行能量</h2>
            <div class="wuxing-chart" id="wuxing-bars"></div>
          </div>
          <h2 class="result-section-label">四柱排盘</h2>
          <div class="paipan-grid" id="paipan-grid"></div>
        </section>

        <section class="result-footer-actions">
          <button type="button" class="hepan-promo-card pulse-subtle" id="hepan-entry-card" aria-label="进入双人合盘，测测缘分指数">
            <span class="hepan-promo-icon" aria-hidden="true">
              <svg viewBox="0 0 40 40" width="40" height="40" fill="none">
                <circle cx="14" cy="16" r="6.5" stroke="#E57373" stroke-width="1.4"/>
                <circle cx="26" cy="16" r="6.5" stroke="#E57373" stroke-width="1.4"/>
                <path d="M10 22c0 6 8 10 10 12 2-2 10-6 10-12" stroke="#C0392B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 16l4 3 4-3" stroke="#C0392B" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
              </svg>
            </span>
            <span class="hepan-promo-body">
              <span class="hepan-promo-title">谁是你的「天生一对」？</span>
              <span class="hepan-promo-cta">测测你们的缘分指数 &gt;</span>
            </span>
          </button>
          <button type="button" class="btn-home-link" id="edit-btn-bottom">← 返回首页</button>
        </section>

        <p class="result-disclaimer">AI说说而已，制作人免责。</p>
      </div>
    </section>

    <!-- 合盘输入页 #/compatibility-input -->
    <section class="result-page hidden" id="hepan-input-section">
      <header class="result-header">
        <button type="button" class="result-nav-btn" id="hepan-input-back" aria-label="返回">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h1 class="result-header-title">缘分校验</h1>
        <span class="result-nav-spacer" aria-hidden="true"></span>
      </header>

      <div class="result-scroll result-scroll--form">
        <p class="hepan-input-lead">填下 TA 的信息，测测你们气场合不合</p>
        <form id="hepan-form" class="hepan-form" autocomplete="off" novalidate>
          <label class="hepan-field">
            <span class="hepan-label">对方昵称</span>
            <input type="text" id="hepan-nickname" class="hepan-inp" maxlength="12" placeholder="怎么称呼 TA" aria-label="对方昵称">
          </label>

          <fieldset class="hepan-relation-seg">
            <legend class="hepan-label">关系类型</legend>
            <div class="relation-seg" role="radiogroup" aria-label="关系类型">
              <label class="seg-opt"><input type="radio" name="hepan-relation" value="romance" checked>异性情缘</label>
              <label class="seg-opt"><input type="radio" name="hepan-relation" value="friend">闺蜜/基友</label>
              <label class="seg-opt"><input type="radio" name="hepan-relation" value="work">事业伙伴</label>
            </div>
          </fieldset>

          <div class="hepan-birth-fields">
            <span class="hepan-label">对方生辰</span>
            <div class="birth-fields hepan-birth-row">
              <label class="field-item">
                <input type="number" id="hepan-year" class="inp-line" min="1920" max="2030" placeholder="1995" aria-label="对方出生年">
                <span class="field-unit">年</span>
              </label>
              <label class="field-item">
                <input type="number" id="hepan-month" class="inp-line inp-short" min="1" max="12" placeholder="8" aria-label="对方月">
                <span class="field-unit">月</span>
              </label>
              <label class="field-item">
                <input type="number" id="hepan-day" class="inp-line inp-short" min="1" max="31" placeholder="15" aria-label="对方日">
                <span class="field-unit">日</span>
              </label>
              <label class="field-item field-shi">
                <select id="hepan-hour" class="inp-line inp-select" aria-label="对方时辰"></select>
              </label>
            </div>
          </div>

          <p class="hepan-form-error hidden" id="hepan-form-error" role="alert"></p>
        </form>
      </div>

      <div class="result-bottom-bar">
        <button type="submit" form="hepan-form" class="btn-hepan-submit">测算缘分深浅</button>
      </div>
    </section>

    <!-- 合盘结果页 #/compatibility-result -->
    <section class="result-page hidden" id="hepan-result-section">
      <header class="result-header">
        <button type="button" class="result-nav-btn" id="hepan-result-back" aria-label="返回">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h1 class="result-header-title">合盘结果</h1>
        <button type="button" class="result-nav-btn" id="hepan-share-btn" aria-label="分享合盘">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 3v12M8 7l4-4 4 4M5 14v5a2 2 0 002 2h10a2 2 0 002-2v-5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>

      <div class="result-scroll">
        <div class="hepan-result" id="hepan-result">
          <div class="hepan-score-block">
            <p class="hepan-score-num" id="hepan-score-num"></p>
            <p class="hepan-score-level" id="hepan-score-level"></p>
            <p class="hepan-score-tagline" id="hepan-score-tagline"></p>
            <p class="hepan-pair-label" id="hepan-pair-label"></p>
          </div>

          <div class="hepan-narrative">
            <p class="hepan-narrative-p" id="hepan-narrative-portrait"></p>
            <p class="hepan-narrative-p hepan-narrative-p--metaphor" id="hepan-narrative-metaphor"></p>
            <p class="hepan-narrative-p hepan-narrative-p--tip" id="hepan-narrative-tip"></p>
          </div>

          <div class="hepan-wx-block">
            <h3 class="hepan-block-title">五行互补</h3>
            <p class="hepan-wx-relation" id="hepan-wx-relation"></p>
            <div class="hepan-dual-bars" id="hepan-dual-bars"></div>
          </div>

          <button type="button" class="btn-hepan-reset" id="hepan-reset-btn">重新测算</button>
        </div>

        <section class="result-stick-wrap stick-zone stick-zone--zen" id="stick-zone">
          <div class="result-module-divider result-module-divider--light" aria-hidden="true"></div>
          <button type="button" class="btn-stick btn-stick--zen" id="fortune-stick-btn" aria-label="长按或摇一摇求灵签">
            <span class="stick-label stick-label--zen">长按 · 摇一摇求灵签</span>
            <span class="stick-stage">
              <span class="stick-hold-ring" aria-hidden="true"></span>
              <span class="stick-pop" id="stick-pop-bar" aria-hidden="true"></span>
              <svg class="stick-tube-icon stick-tube-icon--zen" viewBox="0 0 48 56" aria-hidden="true">
                <ellipse cx="24" cy="17" rx="11" ry="2.8" fill="none" stroke="currentColor" stroke-width="0.75" opacity="0.4"/>
                <path d="M13 17 L35 17" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                <path d="M13 17 C11 17 10 44 24 50 C38 44 37 17 35 17" fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
                <line x1="21" y1="22" x2="21" y2="36" stroke="currentColor" stroke-width="0.5" opacity="0.2" stroke-linecap="round"/>
                <line x1="24" y1="21" x2="24" y2="38" stroke="currentColor" stroke-width="0.5" opacity="0.25" stroke-linecap="round"/>
                <line x1="27" y1="23" x2="27" y2="35" stroke="currentColor" stroke-width="0.5" opacity="0.18" stroke-linecap="round"/>
              </svg>
            </span>
          </button>
          <p class="stick-motion-hint hidden" id="stick-motion-hint" aria-live="polite"></p>
          <div class="fortune-stick-card fortune-stick-card--zen hidden" id="fortune-stick-card">
            <p class="fortune-stick-no" id="fortune-stick-no"></p>
            <div class="fortune-stick-msg" id="fortune-stick-msg"></div>
          </div>
        </section>

        <p class="result-disclaimer">AI说说而已，制作人免责。</p>
      </div>
    </section>

    <div class="share-sheet hidden" id="share-sheet" role="dialog" aria-modal="true" aria-labelledby="share-sheet-title">
      <div class="share-sheet-backdrop" id="share-sheet-backdrop"></div>
      <div class="share-sheet-panel">
        <button type="button" class="share-sheet-close" id="share-sheet-close" aria-label="关闭">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <h2 class="share-sheet-title" id="share-sheet-title">分享日签</h2>
        <div class="share-sheet-preview-wrap">
          <div class="share-poster share-poster-preview" id="share-poster-preview" aria-hidden="true"></div>
        </div>
        <div class="share-sheet-actions">
          <button type="button" class="btn-share-save" id="share-save-btn">保存到相册</button>
          <button type="button" class="btn-share-friend" id="share-friend-btn">分享给好友</button>
        </div>
      </div>
    </div>

    <div id="share-poster" class="share-poster share-poster-capture" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" crossorigin="anonymous"></script>
  <script src="js/ai-config.js?v=22"></script>
  <script src="js/bazi.js?v=22"></script>
  <script src="js/huangli.js?v=22"></script>
  <script src="js/paipan.js?v=23"></script>
  <script src="js/wuxing-icon.js?v=1"></script>
  <script src="js/fortune.js?v=28"></script>
  <script src="js/ai-fortune.js?v=29"></script>
  <script src="js/daily-hint.js?v=2"></script>
  <script src="js/energy-prescription.js?v=2"></script>
  <script src="js/empathy-copy.js?v=1"></script>
  <script src="js/fortune-stick.js?v=28"></script>
  <script src="js/muyu.js?v=23"></script>
  <script src="js/share-poster.js?v=2"></script>
  <script src="js/hepan.js?v=2"></script>
  <script src="js/router.js?v=1"></script>
  <script src="js/app.js?v=43"></script>
</body>
</html>
