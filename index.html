<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f7f5f0">
  <title>今日运势 · 八字</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>今日运势</h1>
      <p class="subtitle">输入生辰八字，查看今日提醒</p>
    </header>

    <main>
      <section class="card" id="form-section">
        <form id="birth-form" autocomplete="off" novalidate>
          <div class="field-row">
            <label for="birth-year">出生年</label>
            <input type="number" id="birth-year" min="1920" max="2030" required placeholder="1990">
          </div>
          <div class="field-row">
            <label for="birth-month">月</label>
            <input type="number" id="birth-month" min="1" max="12" required placeholder="6">
          </div>
          <div class="field-row">
            <label for="birth-day">日</label>
            <input type="number" id="birth-day" min="1" max="31" required placeholder="15">
          </div>
          <div class="field-row">
            <label for="birth-hour">时辰</label>
            <select id="birth-hour">
              <option value="" disabled selected>选择时辰</option>
            </select>
          </div>
          <div class="field-row">
            <label>性别</label>
            <div class="gender-group" role="radiogroup" aria-label="性别">
              <label class="gender-opt"><input type="radio" name="gender" value="male" checked> 男</label>
              <label class="gender-opt"><input type="radio" name="gender" value="female"> 女</label>
            </div>
          </div>
          <p class="hint">时辰按北京时间，子时含 23:00–00:59</p>
          <p class="form-error hidden" id="form-error" role="alert"></p>
          <button type="button" class="btn-primary" id="submit-btn">查看今日运势</button>
        </form>
      </section>

      <section class="card hidden" id="result-section">
        <div class="date-bar">
          <span id="today-date"></span>
        </div>

        <div class="bazi-block">
          <h2>您的八字</h2>
          <div class="pillars" id="user-pillars"></div>
          <p class="day-master">日主：<strong id="day-master"></strong></p>
        </div>

        <div class="bazi-block">
          <h2>今日干支</h2>
          <div class="pillars" id="today-pillars"></div>
        </div>

        <div class="bazi-block">
          <h2>大运 · 流年</h2>
          <div class="luck-grid" id="luck-grid"></div>
          <p class="luck-meta" id="luck-meta"></p>
        </div>

        <div class="energy-block">
          <h2>能量影响</h2>
          <p class="energy-overview" id="energy-overview"></p>
          <div class="energy-list" id="energy-list"></div>
        </div>

        <div class="score-block">
          <div class="score-ring" id="score-ring">
            <span class="score-num" id="score-num">—</span>
            <span class="score-label">综合运势</span>
          </div>
          <p class="summary" id="summary"></p>
        </div>

        <div class="fortune-list" id="fortune-list"></div>

        <button type="button" class="btn-secondary" id="edit-btn">修改生辰</button>
      </section>
    </main>

    <footer class="footer">
      <p>仅供娱乐参考，请理性看待</p>
    </footer>
  </div>

  <script src="js/bazi.js"></script>
  <script src="js/fortune.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
