<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#f9faf8">
  <title>老黄历</title>
  <link rel="stylesheet" href="css/style.css?v=28">
</head>
<body>
  <div class="app">
    <main id="home-section" class="home-screen">
      <section class="home-almanac">
        <div class="almanac-inner">
          <h1 class="home-title">老黄历</h1>
          <p class="home-datetime" id="home-datetime"></p>
          <div class="ganzhi-inline" id="home-ganzhi"></div>
          <p class="jieqi-note" id="jieqi-note"></p>
          <div class="huangli-compact" id="huangli-block"></div>
          <p class="daily-hint" id="daily-hint"></p>
        </div>
      </section>

      <section class="home-birth">
        <h2 class="birth-heading">输入出生时间</h2>
        <form id="birth-form" class="birth-inline" autocomplete="off" novalidate>
          <div class="birth-row">
            <input type="number" id="birth-year" class="inp-n" min="1920" max="2030" placeholder="1990" aria-label="出生年">
            <span class="unit">年</span>
            <input type="number" id="birth-month" class="inp-n inp-s" min="1" max="12" placeholder="6" aria-label="月">
            <span class="unit">月</span>
            <input type="number" id="birth-day" class="inp-n inp-s" min="1" max="31" placeholder="15" aria-label="日">
            <span class="unit">日</span>
            <select id="birth-hour" class="inp-shi" aria-label="出生时辰"></select>
          </div>
          <div class="birth-row birth-row-gender">
            <div class="gender-inline" role="radiogroup" aria-label="性别">
              <label class="g-opt"><input type="radio" name="gender" value="male" checked>男</label>
              <label class="g-opt"><input type="radio" name="gender" value="female">女</label>
            </div>
          </div>
          <p class="form-error hidden" id="form-error" role="alert"></p>
          <button type="button" class="btn-muyu" id="submit-btn" aria-label="点击查看今日剧本">
            <svg class="muyu-icon" viewBox="0 0 48 48" aria-hidden="true">
              <ellipse cx="24" cy="26" rx="16" ry="11" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <path d="M12 26 Q24 18 36 26" fill="none" stroke="currentColor" stroke-width="1"/>
              <line x1="24" y1="15" x2="24" y2="37" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
              <circle cx="24" cy="12" r="2" fill="currentColor" opacity="0.35"/>
            </svg>
            <span class="muyu-label">点击查看今日剧本</span>
          </button>
          <button type="button" class="btn-link hidden" id="quick-btn">查看已保存</button>
        </form>
        <footer class="home-footer">
          <p>AI说说而已，制作人免责。</p>
        </footer>
      </section>
    </main>

    <section class="hidden" id="result-section">
      <p class="result-date" id="today-date"></p>

      <div class="card result-panel">
        <h2 class="panel-title">今日能量</h2>
        <p class="ai-status" id="ai-status">正在生成个性化解读…</p>
        <div class="hp-bars" id="hp-bars"></div>
        <div class="energy-hints" id="energy-hints"></div>
      </div>

      <div class="card result-panel fortune-stick-section" id="fortune-stick-section">
        <p class="fortune-stick-hint">摇一摇，求根签</p>
        <button type="button" class="btn-fortune-stick" id="fortune-stick-btn" aria-label="摇签求签">
          <div class="fortune-stick-stage">
            <div class="fortune-stick-pop" aria-hidden="true"></div>
            <svg class="fortune-stick-icon" viewBox="0 0 48 48" aria-hidden="true">
              <ellipse cx="24" cy="18" rx="13" ry="4" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <path d="M11 18 L9 36" fill="none" stroke="currentColor" stroke-width="1"/>
              <path d="M37 18 L39 36" fill="none" stroke="currentColor" stroke-width="1"/>
              <ellipse cx="24" cy="36" rx="15" ry="4.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <path d="M13 20 Q24 22 35 20" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.45"/>
              <line x1="18" y1="16" x2="17" y2="7" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
              <line x1="22" y1="15" x2="21" y2="6" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.85"/>
              <line x1="26" y1="15" x2="27" y2="6" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.75"/>
              <line x1="30" y1="16" x2="31" y2="8" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.65"/>
              <line x1="24" y1="20" x2="24" y2="33" stroke="currentColor" stroke-width="0.8" opacity="0.35"/>
            </svg>
          </div>
        </button>
        <div class="fortune-stick-card hidden" id="fortune-stick-card">
          <p class="fortune-stick-no" id="fortune-stick-no"></p>
          <div class="fortune-stick-msg" id="fortune-stick-msg"></div>
        </div>
      </div>

      <div class="card result-panel">
        <h2 class="panel-title">八字排盘</h2>
        <p class="panel-sub">日主：<span id="day-master"></span></p>
        <div class="paipan-grid" id="paipan-grid"></div>
        <div class="wuxing-pie" id="wuxing-pie"></div>
        <p class="personality-summary" id="personality-summary"></p>
      </div>

      <div class="card result-panel">
        <h2 class="panel-title">流年大运</h2>
        <div class="liunian-highlight" id="liunian-highlight"></div>
        <div class="luck-detail" id="luck-detail"></div>
        <div class="dayun-scroll" id="dayun-scroll"></div>
        <p class="luck-meta" id="luck-meta"></p>
      </div>

      <button type="button" class="btn-secondary result-back" id="edit-btn">返回首页</button>

      <footer class="footer result-footer">
        <p>AI说说而已，制作人免责。</p>
      </footer>
    </section>
  </div>

  <script src="js/ai-config.js?v=22"></script>
  <script src="js/bazi.js?v=22"></script>
  <script src="js/huangli.js?v=22"></script>
  <script src="js/paipan.js?v=22"></script>
  <script src="js/fortune.js?v=28"></script>
  <script src="js/ai-fortune.js?v=28"></script>
  <script src="js/fortune-stick.js?v=26"></script>
  <script src="js/muyu.js?v=22"></script>
  <script src="js/app.js?v=28"></script>
</body>
</html>
